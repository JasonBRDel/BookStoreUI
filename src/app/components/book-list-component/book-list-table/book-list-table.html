<table class="table table-striped table-hover">
  <thead>
    <tr class="table-primary">
      <th scope="col">#</th>
      <th scope="col">Title</th>
      <th scope="col">Author</th>
      <th scope="col">Price</th>
      <th scope="col">Stock</th>
      <th scope="col">Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let book of data; let i = index">
      <th scope="row">{{i+1}}</th>
      <td>{{book.title}}</td>
      <td>{{book.author}}</td>
      <td>{{book.price}}</td>
      <td>{{book.inventory}}</td>
      <td>
        <button type="button" (click)="createOrder(book)" class="btn btn-outline-primary"><i
            class="bi bi-cart-plus"></i></button>
      </td>
    </tr>
  </tbody>
</table>
